name: Mod kompilieren

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Java 21 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle einrichten
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.2'

      - name: Mod bauen
        working-directory: iteminfo
        run: gradle build

      - name: JAR hochladen
        uses: actions/upload-artifact@v4
        with:
          name: ItemInfo-Mod-JAR
          path: iteminfo/build/libs/*[^-sources].jar
          if-no-files-found: error
