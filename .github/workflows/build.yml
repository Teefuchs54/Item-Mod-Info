name: Mod kompilieren

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Java 21 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle automatisch installieren
        run: |
          GRADLE_VERSION=$(curl -s https://services.gradle.org/versions/current | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")
          echo "Installiere Gradle ${GRADLE_VERSION}"
          wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-${GRADLE_VERSION}/bin" >> $GITHUB_PATH

      - name: Mod bauen
        working-directory: iteminfo
        run: gradle build

      - name: JAR hochladen
        uses: actions/upload-artifact@v4
        with:
          name: ItemInfo-Mod-JAR
          path: iteminfo/build/libs/*[^-sources].jar
          if-no-files-found: error
